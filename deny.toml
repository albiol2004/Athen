# cargo-deny configuration.
#
# Run with `cargo deny check advisories` (install: `cargo install cargo-deny --locked`).
# Wired into CI as the "Cargo deny" job in .github/workflows/ci.yml.

[advisories]
version = 2
yanked = "warn"
# Only flag `unmaintained` advisories for crates the workspace depends on
# directly — not the deep transitive ones we have no power to fix and that
# carry no active vulnerability: gtk-rs (×11, via Tauri's GTK3 stack), unic-*
# (×5, via tauri-utils -> urlpattern), and paste / proc-macro-error / fxhash
# (via assorted proc-macro deps). Vulnerability and unsound advisories still
# hard-fail regardless of scope, so real security issues are never silenced.
unmaintained = "workspace"
ignore = [
    # (none — RUSTSEC-2024-0429 glib unsoundness dropped: Tauri 2.11 pulls a
    # patched glib, so the advisory no longer matches any crate in the tree.)
]
