<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athen</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <header>
            <div class="header-left">
                <div class="logo">A</div>
                <div class="header-text">
                    <h1>Athen</h1>
                    <span class="subtitle">Universal AI Agent</span>
                </div>
            </div>
            <button id="new-chat-btn" title="Start a new conversation">New Chat</button>
        </header>

        <main id="chat-container">
            <div id="messages">
                <div class="welcome-message">
                    <div class="welcome-icon">A</div>
                    <p>Hello! I'm <strong>Athen</strong>, your universal AI agent. I can execute shell commands, read and write files, manage tasks, and more.</p>
                    <p class="welcome-hint">Type a message below to get started.</p>
                </div>
            </div>
        </main>

        <footer>
            <form id="input-form">
                <div class="input-wrapper">
                    <textarea id="message-input" placeholder="Send a message..." rows="1" autofocus></textarea>
                    <button type="submit" id="send-btn" title="Send message">
                        <span class="send-icon">&#10148;</span>
                    </button>
                </div>
            </form>
            <div id="status-bar">
                <span id="status-dot" class="status-dot idle"></span>
                <span id="status-text">Ready</span>
            </div>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
